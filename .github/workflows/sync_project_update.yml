                          - name: Set up Python
                                  uses: actions/setup-python@v5
                                          with:
                                                    python-version: "3.11"

                                                          - name: Install dependencies
                                                                  run: pip install -r requirements.txt

                                                                        - name: Rebuild analysis outputs
                                                                                run: |
                                                                                          python src/clean_data.py
                                                                                                    python src/analyze_donations.py
                                                                                                              python src/analyze_inventory.py
                                                                                                                        python src/analyze_sales.py
                                                                                                                                  python src/analyze_booth_layout.py
                                                                                                                                            python src/create_charts.py
                                                                                                                                                      python src/train_price_model.py
                                                                                                                                                                python src/train_sale_success_model.py
                                                                                                                                                                          python -m unittest discover -s tests
                                                                                                                                                                          
                                                                                                                                                                                - name: Commit synchronized files
                                                                                                                                                                                        run: |
                                                                                                                                                                                                  git config user.name "github-actions[bot]"
                                                                                                                                                                                                            git config user.email "github-actions[bot]@users.noreply.github.com"
                                                                                                                                                                                                                      git add README.md requirements.txt data docs reports src tests dashboard models
                                                                                                                                                                                                                                if git diff --cached --quiet; then
                                                                                                                                                                                                                                            echo "No project file changes to commit."
                                                                                                                                                                                                                                                      else
                                                                                                                                                                                                                                                                  git commit -m "Add simple ML experiments and dashboard"
                                                                                                                                                                                                                                                                              git push
                                                                                                                                                                                                                                                                                        fi
                                                                                                                                                                                                                                                                                        
