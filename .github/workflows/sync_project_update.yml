{"name":"Patch chart backend","on":{"push":{"paths":[".github/workflows/sync_project_update.yml"]},"workflow_dispatch":{}},"permissions":{"contents":"write"},"jobs":{"patch":{"runs-on":"ubuntu-latest","steps":[{"uses":"actions/checkout@v4"},{"name":"Patch source files","run":"python - <<'PY'\nfrom pathlib import Path\nfiles = [\"src/create_charts.py\", \"src/train_price_model.py\", \"src/train_sale_success_model.py\"]\nreplacement = \"import matplotlib\" + chr(10) + chr(10) + \"matplotlib.use(\\\"Agg\\\")\" + chr(10) + chr(10) + \"import matplotlib.pyplot as plt\"\nfor file_name in files:\n    path = Path(file_name)\n    text = path.read_text()\n    if \"matplotlib.use(\\\"Agg\\\")\" not in text:\n        path.write_text(text.replace(\"import matplotlib.pyplot as plt\", replacement))\ngitignore = Path(\".gitignore\")\ntext = gitignore.read_text()\nif \"._*\" not in text.splitlines():\n    gitignore.write_text(text.rstrip() + chr(10) + \"._*\" + chr(10))\nPY"},{"name":"Install dependencies","run":"pip install -r requirements.txt"},{"name":"Run chart check","run":"python src/create_charts.py"},{"name":"Commit source patch","run":"git config user.name \"github-actions[bot]\"\ngit config user.email \"github-actions[bot]@users.noreply.github.com\"\ngit add .gitignore src/create_charts.py src/train_price_model.py src/train_sale_success_model.py\nif git diff --cached --quiet; then\n  echo \"No backend patch needed.\"\nelse\n  git commit -m \"Use non-interactive matplotlib backend\"\n  git pull --rebase origin main\n  git push\nfi"}]}}}
