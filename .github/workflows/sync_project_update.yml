name: Sync project update
'on': {push: {paths: [".github/workflows/sync_project_update.yml"]}, workflow_dispatch: {}}
permissions: {contents: write}
jobs: {"sync-project-files": {"runs-on": ubuntu-latest, steps: [{name: Check out repository, uses: actions/checkout@v4}, {name: Set up Python, uses: actions/setup-python@v5, with: {"python-version": "3.11"}}, {name: Restore updated project files, run: 'python -c ''import base64,tarfile; from pathlib import Path; data=""; p=Path("/tmp/project_update.tar.gz"); p.write_bytes(base64.b64decode(data)); tarfile.open(p).extractall(".")'''}, {name: Install dependencies, run: "pip install -r requirements.txt"}, {name: Rebuild analysis outputs, run: 'python src/clean_data.py && python src/analyze_donations.py && python src/analyze_inventory.py && python src/analyze_sales.py && python src/analyze_booth_layout.py && python src/create_charts.py && python src/train_price_model.py && python src/train_sale_success_model.py && python -m unittest discover -s tests'}, {name: Commit synchronized files, run: 'git config user.name "github-actions[bot]" && git config user.email "github-actions[bot]@users.noreply.github.com" && git add README.md requirements.txt data docs reports src tests dashboard models && (git diff --cached --quiet || (git commit -m "Add simple ML experiments and dashboard" && git push))'}]}}
