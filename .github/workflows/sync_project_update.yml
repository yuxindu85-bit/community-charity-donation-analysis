{"name":"Temporary project patch","on":{"push":{"paths":[".github/workflows/sync_project_update.yml"]},"workflow_dispatch":{}},"permissions":{"contents":"write"},"jobs":{"patch":{"runs-on":"ubuntu-latest","steps":[{"uses":"actions/checkout@v4"},{"name":"Patch backend and restore workflow","run":"python - <<'PY'\nfrom pathlib import Path\n\nfiles = [\n    \"src/create_charts.py\",\n    \"src/train_price_model.py\",\n    \"src/train_sale_success_model.py\",\n]\nreplacement = \"import matplotlib\" + chr(10) + chr(10) + \"matplotlib.use(\\\"Agg\\\")\" + chr(10) + chr(10) + \"import matplotlib.pyplot as plt\"\n\nfor file_name in files:\n    path = Path(file_name)\n    text = path.read_text()\n    if \"matplotlib.use(\\\"Agg\\\")\" not in text:\n        text = text.replace(\"import matplotlib.pyplot as plt\", replacement)\n        path.write_text(text)\n\ngitignore = Path(\".gitignore\")\ntext = gitignore.read_text()\nif \"._*\" not in text.splitlines():\n    gitignore.write_text(text.rstrip() + chr(10) + \"._*\" + chr(10))\n\nPath(\".github/workflows/sync_project_update.yml\").write_text(chr(10).join([\"name: Project maintenance\",\"\",\"on:\",\"  workflow_dispatch:\",\"\",\"permissions:\",\"  contents: read\",\"\",\"jobs:\",\"  verify-project:\",\"    runs-on: ubuntu-latest\",\"    steps:\",\"      - uses: actions/checkout@v4\",\"      - name: Install dependencies\",\"        run: pip install -r requirements.txt\",\"      - name: Run project scripts\",\"        run: |\",\"          python src/clean_data.py\",\"          python src/analyze_donations.py\",\"          python src/analyze_inventory.py\",\"          python src/analyze_sales.py\",\"          python src/analyze_booth_layout.py\",\"          python src/create_charts.py\",\"          python src/train_price_model.py\",\"          python src/train_sale_success_model.py\",\"      - name: Run tests\",\"        run: python -m unittest discover -s tests\"]) + chr(10))\nPY"},{"name":"Install dependencies","run":"pip install -r requirements.txt"},{"name":"Run chart check","run":"python src/create_charts.py"},{"name":"Commit project patch","run":"git config user.name \"github-actions[bot]\"\ngit config user.email \"github-actions[bot]@users.noreply.github.com\"\ngit add .gitignore .github/workflows/sync_project_update.yml src/create_charts.py src/train_price_model.py src/train_sale_success_model.py\nif git diff --cached --quiet; then\n  echo \"No backend patch needed.\"\nelse\n  git commit -m \"Use non-interactive matplotlib backend\"\n  git push\nfi"}]}}}
