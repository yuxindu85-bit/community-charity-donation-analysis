name: Clean repository metadata

on:
  push:
    paths:
      - ".github/workflows/sync_project_update.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  clean-macos-metadata:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Remove macOS metadata files
        run: |
          find . -name '._*' -type f -delete
          grep -qxF '._*' .gitignore || echo '._*' >> .gitignore
      - name: Commit cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No cleanup changes needed."
          else
            git commit -m "Remove macOS metadata files"
            git push
          fi
