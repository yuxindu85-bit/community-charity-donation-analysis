name: Generate analysis outputs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run data workflow
        run: |
          python src/clean_data.py
          python src/analyze_donations.py
          python src/analyze_inventory.py
          python src/analyze_sales.py
          python src/analyze_booth_layout.py
          python src/create_charts.py
          python -m unittest discover -s tests

      - name: Commit generated outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/processed reports/summary_tables reports/charts
          git diff --staged --quiet || git commit -m "Update generated analysis outputs"
          git push
